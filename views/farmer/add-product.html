<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Product</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">

        <h2>Farmer Portal</h2>

        <div>
            <a href="/farmer/dashboard">Dashboard</a>
            <a href="/farmer/add-product">Add Product</a>
            <a href="/farmer/products">My Products</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>

    </nav>


    <div class="auth-container">

        <h1>Add Product</h1>

        <form id="productForm">

            <input id="name" type="text" placeholder="Product Name" required>

            <input id="category" type="text" placeholder="Category (Vegetables, Fruits, Grains)" required>

            <textarea id="description" placeholder="Product Description"></textarea>

            <input id="price" type="number" min="0" step="0.01" placeholder="Price" required>

            <input id="quantity" type="number" min="0" placeholder="Quantity" required>

            <select id="unit">
                <option value="kg">Kilogram</option>
                <option value="quintal">Quintal</option>
                <option value="ton">Ton</option>
                <option value="piece">Piece</option>
                <option value="dozen">Dozen</option>
            </select>

            <input id="location" type="text" placeholder="Product Location">

            <button type="submit">
                Add Product
            </button>

        </form>

        <p id="message"></p>

    </div>


    <script>

        const token = localStorage.getItem("token");

        const user =
            JSON.parse(localStorage.getItem("user"));


        if (!token || !user || user.role !== "farmer") {

            window.location.href = "/login";
        }


        const form =
            document.getElementById("productForm");


        form.addEventListener("submit", async (event) => {

            event.preventDefault();


            const data = {

                name:
                    document.getElementById("name").value,

                category:
                    document.getElementById("category").value,

                description:
                    document.getElementById("description").value,

                price:
                    Number(document.getElementById("price").value),

                quantity:
                    Number(document.getElementById("quantity").value),

                unit:
                    document.getElementById("unit").value,

                location:
                    document.getElementById("location").value
            };


            try {

                const response =
                    await fetch("/api/products", {

                        method: "POST",

                        headers: {

                            "Content-Type":
                                "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        },

                        body:
                            JSON.stringify(data)
                    });


                const result =
                    await response.json();


                document.getElementById("message")
                    .innerText = result.message;


                if (response.ok) {

                    form.reset();

                    setTimeout(() => {

                        window.location.href =
                            "/farmer/products";

                    }, 800);
                }


                if (response.status === 401) {

                    localStorage.clear();

                    window.location.href = "/login";
                }


            } catch (error) {

                document.getElementById("message")
                    .innerText =
                    "Unable to connect to server";
            }

        });


        function logout() {

            localStorage.removeItem("token");

            localStorage.removeItem("user");

            window.location.href = "/login";
        }

    </script>

</body>

</html>
