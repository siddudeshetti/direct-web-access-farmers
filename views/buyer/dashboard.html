<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buyer Dashboard</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">

        <h2>Buyer Portal</h2>

        <div>
            <a href="/buyer/dashboard">Dashboard</a>
            <a href="/buyer/products">Marketplace</a>
            <a href="/buyer/cart">Cart</a>
            <a href="/buyer/orders">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>

    </nav>


    <main class="dashboard">

        <h1 id="welcome">Welcome Buyer</h1>

        <div class="card-container">

            <div class="card">

                <h3>Marketplace</h3>

                <p>
                    Browse agricultural products directly
                    from farmers.
                </p>

                <a href="/buyer/products">
                    Browse Products
                </a>

            </div>


            <div class="card">

                <h3>Shopping Cart</h3>

                <p>
                    View products you want to purchase.
                </p>

                <a href="/buyer/cart">
                    View Cart
                </a>

            </div>


            <div class="card">

                <h3>My Orders</h3>

                <p>
                    View your previous and current orders.
                </p>

                <a href="/buyer/orders">
                    View Orders
                </a>

            </div>

        </div>

    </main>


    <script>

        const token =
            localStorage.getItem("token");

        const user =
            JSON.parse(localStorage.getItem("user"));


        if (!token || !user || user.role !== "buyer") {

            window.location.href = "/login";

        } else {

            document.getElementById("welcome")
                .innerText =
                `Welcome, ${user.name}`;
        }


        function logout() {

            localStorage.removeItem("token");

            localStorage.removeItem("user");

            localStorage.removeItem("cart");

            window.location.href = "/login";
        }

    </script>

</body>

</html>
