<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shopping Cart</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">
        <h2>Buyer Portal</h2>

        <div>
            <a href="/buyer/dashboard">Dashboard</a>
            <a href="/buyer/products">Marketplace</a>
            <a href="/buyer/cart">Cart</a>
            <a href="/buyer/orders">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>


    <main class="dashboard">

        <h1>Shopping Cart</h1>

        <p id="message"></p>

        <div id="cartItems" class="product-grid"></div>

        <div id="checkoutSection" class="checkout-section">

            <h2 id="total">Total: ₹0</h2>

            <textarea id="deliveryAddress" placeholder="Enter delivery address"></textarea>

            <button class="checkout-button" onclick="checkout()">
                Place Order
            </button>

        </div>

    </main>


    <script>

        const token = localStorage.getItem("token");

        const user = JSON.parse(
            localStorage.getItem("user")
        );


        if (!token || !user || user.role !== "buyer") {
            window.location.href = "/login";
        }


        function getCart() {
            return JSON.parse(
                localStorage.getItem("cart")
            ) || [];
        }


        function saveCart(cart) {
            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );
        }


        function displayCart() {

            const cart = getCart();

            const container =
                document.getElementById("cartItems");

            const message =
                document.getElementById("message");

            const checkoutSection =
                document.getElementById("checkoutSection");


            container.innerHTML = "";


            if (cart.length === 0) {
                message.innerText = "Your cart is empty.";

                checkoutSection.style.display = "none";

                return;
            }


            message.innerText = "";

            checkoutSection.style.display = "block";


            let total = 0;


            cart.forEach(item => {

                const product = item.product;

                total += product.price * item.quantity;


                const card =
                    document.createElement("div");

                card.className = "product-card";


                card.innerHTML = `

            <h2>${escapeHTML(product.name)}</h2>

            <p>
                ₹${product.price}
                per
                ${escapeHTML(product.unit)}
            </p>

            <p>
                Quantity: ${item.quantity}
            </p>

            <p>
                Subtotal:
                ₹${(
                        product.price *
                        item.quantity
                    ).toFixed(2)}
            </p>

            <button
                class="delete-button"
                onclick="removeItem('${product._id}')"
            >
                Remove
            </button>
        `;


                container.appendChild(card);
            });


            document.getElementById("total")
                .innerText =
                `Total: ₹${total.toFixed(2)}`;
        }


        function removeItem(productId) {

            const cart = getCart().filter(
                item => item.product._id !== productId
            );

            saveCart(cart);

            displayCart();
        }


        async function checkout() {

            const cart = getCart();

            const deliveryAddress =
                document
                    .getElementById("deliveryAddress")
                    .value
                    .trim();


            if (cart.length === 0) {
                alert("Cart is empty");
                return;
            }


            if (!deliveryAddress) {
                alert("Enter delivery address");
                return;
            }


            const items = cart.map(item => ({
                productId: item.product._id,
                quantity: item.quantity
            }));


            try {

                const response =
                    await fetch("/api/orders", {

                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        },

                        body: JSON.stringify({
                            items,
                            deliveryAddress
                        })
                    });


                const result = await response.json();


                if (!response.ok) {
                    alert(result.message);
                    return;
                }


                localStorage.removeItem("cart");

                alert(result.message);

                window.location.href =
                    "/buyer/orders";


            } catch (error) {

                alert("Unable to connect to server");
            }
        }


        function escapeHTML(value) {

            const element =
                document.createElement("div");

            element.textContent = String(value);

            return element.innerHTML;
        }


        function logout() {

            localStorage.removeItem("token");

            localStorage.removeItem("user");

            localStorage.removeItem("cart");

            window.location.href = "/login";
        }


        displayCart();

    </script>

</body>

</html>
