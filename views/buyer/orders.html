<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">
        <h2>Buyer Portal</h2>

        <div>
            <a href="/buyer/dashboard">Dashboard</a>
            <a href="/buyer/products">Marketplace</a>
            <a href="/buyer/cart">Cart</a>
            <a href="/buyer/orders">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <main class="dashboard">

        <h1>My Orders</h1>

        <p id="message"></p>

        <div id="orders" class="order-container"></div>

    </main>

    <script>

        const token = localStorage.getItem("token");

        const user =
            JSON.parse(localStorage.getItem("user"));


        if (!token || !user || user.role !== "buyer") {
            window.location.href = "/login";
        }


        async function loadOrders() {

            const container =
                document.getElementById("orders");

            const message =
                document.getElementById("message");


            try {

                const response =
                    await fetch("/api/orders/mine", {

                        headers: {
                            Authorization:
                                `Bearer ${token}`
                        }

                    });


                const orders =
                    await response.json();


                if (response.status === 401) {

                    localStorage.clear();

                    window.location.href = "/login";

                    return;
                }


                if (!response.ok) {

                    message.innerText =
                        orders.message ||
                        "Unable to load orders";

                    return;
                }


                if (orders.length === 0) {

                    message.innerText =
                        "You have not placed any orders.";

                    return;
                }


                container.innerHTML = "";

                message.innerText = "";


                orders.forEach(order => {

                    const card =
                        document.createElement("div");

                    card.className = "order-card";


                    const itemsHTML =
                        order.items.map(item => `

                    <div class="order-item">

                        <strong>
                            ${escapeHTML(item.name)}
                        </strong>

                        <span>
                            ${item.quantity}
                            ${escapeHTML(item.unit)}
                            ×
                            ₹${item.price}
                        </span>

                    </div>

                `).join("");


                    card.innerHTML = `

                <div class="order-header">

                    <h2>
                        Order
                        ${escapeHTML(order._id)}
                    </h2>

                    <span class="status-badge">
                        ${escapeHTML(order.status)}
                    </span>

                </div>


                ${itemsHTML}


                <p>
                    <strong>Total:</strong>
                    ₹${Number(
                        order.totalAmount
                    ).toFixed(2)}
                </p>


                <p>
                    <strong>Delivery Address:</strong>
                    ${escapeHTML(
                        order.deliveryAddress
                    )}
                </p>


                <p>
                    <strong>Ordered:</strong>
                    ${new Date(
                        order.createdAt
                    ).toLocaleString()}
                </p>

            `;


                    container.appendChild(card);

                });


            } catch (error) {

                message.innerText =
                    "Unable to connect to server";
            }

        }


        function escapeHTML(value) {

            const element =
                document.createElement("div");

            element.textContent = String(value);

            return element.innerHTML;
        }


        function logout() {

            localStorage.removeItem("token");

            localStorage.removeItem("user");

            localStorage.removeItem("cart");

            window.location.href = "/login";
        }


        loadOrders();

    </script>

</body>

</html>
